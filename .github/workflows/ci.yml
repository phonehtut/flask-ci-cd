name: Flask CI/CD

on:
  push:
    branches: ['main']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pyton
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Package
        run: |
          pip install -r requirements.txt

      - name: Run Test
        run: |
          pytest